models:
  cheap:
    provider: huggingface_pipeline
    model: microsoft/Phi-3-mini-4k-instruct
    temperature: 0.4
    timeout: 180
    max_new_tokens: 2048

  strong:
    provider: deepseek
    model: deepseek-chat
    temperature: 0.1
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    timeout: 120

  embedding:
    provider: huggingface
    model: all-MiniLM-L6-v2

cascade:
  frs_threshold: 0.7
  tc_threshold: 0.65
  always_both: true

qdrant:
  mode: local
  path: ./qdrant_data
  collections:
    stories: stories_v1
    frs_outputs: frs_outputs_v1
    tc_outputs: tc_outputs_v1
    prompts: prompts_v1
  vector_size: 384
  distance: Cosine

database:
  sqlite_path: kb.sqlite

import:
  validation:
    fr_ref_pattern: "^FR-\\d{3}$"
    tc_id_pattern: "^TC-\\d{3}-\\d{2}$"
    valid_priorities: ["Critical", "High", "Medium", "Low"]
    valid_statuses: ["Done", "In Progress", "Backlog", "Blocked"]

agents:
  rag:
    top_k: 3
    min_similarity: 0.6
compliance:
  max_iterations: 5
  threshold_gt: 0.95       # when ground truth exists
  threshold_self: 0.90     # self-evaluation only
  critique_inject: true    # feed critique back into prompt each round

cascade:
    max_retries: 2
